<div
  class="toast-container position-fixed top-0 end-0 p-3"
  style="z-index: 1080"
  aria-live="polite"
  aria-atomic="true"
>
  @for (toast of toastService.toasts(); track toast.id) {
    <div class="toast show shadow-sm border-0 mb-2" role="status" [class]="classMap[toast.kind]">
      <div class="d-flex align-items-start">
        <div class="toast-body flex-grow-1">
          <span class="me-2 fw-bold" aria-hidden="true">{{ iconMap[toast.kind] }}</span>
          {{ toast.message }}
        </div>
        <button
          type="button"
          class="btn-close btn-close-white me-2 mt-2"
          (click)="dismiss(toast.id)"
          aria-label="Cerrar"
        ></button>
      </div>
    </div>
  }
</div>

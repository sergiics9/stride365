<a class="visually-hidden-focusable skip-link" href="#main-content">Saltar al contenido principal</a>

<!-- ─── Navbar superior (solo desktop ≥ lg) ─────────────────────────── -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top d-none d-lg-flex"
  aria-label="Navegación principal">
  <div class="container-fluid">
    <a class="navbar-brand fw-semibold" routerLink="/feed">Stride365</a>

    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" routerLink="/feed" routerLinkActive="active">Feed</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" routerLink="/clubes" routerLinkActive="active">Clubes</a>
        </li>

        @if (auth.isSuperAdmin()) {
        <li class="nav-item">
          <a class="nav-link" routerLink="/super-admin" routerLinkActive="active">Admin</a>
        </li>
        }
      </ul>

      <ul class="navbar-nav align-items-lg-center gap-1">
        <!-- Toggle tema -->
        <li class="nav-item">
          <button
            type="button"
            class="theme-toggle"
            (click)="theme.toggle()"
            [attr.aria-label]="theme.isDark() ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro'"
            [title]="theme.isDark() ? 'Modo claro' : 'Modo oscuro'"
          >
            @if (theme.isDark()) {
            <!-- Sol -->
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="4.5"/>
              <line x1="12" y1="2" x2="12" y2="4.5"/>
              <line x1="12" y1="19.5" x2="12" y2="22"/>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
              <line x1="2" y1="12" x2="4.5" y2="12"/>
              <line x1="19.5" y1="12" x2="22" y2="12"/>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
            } @else {
            <!-- Luna -->
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
            }
          </button>
        </li>

        <li class="nav-item dropdown">
          <button type="button"
            class="btn btn-link nav-link dropdown-toggle d-flex align-items-center gap-2 text-decoration-none"
            data-bs-toggle="dropdown" aria-expanded="false">
            <span>{{ auth.fullName() || 'Mi cuenta' }}</span>
            @if (primaryRoleLabel()) {
            <span class="badge bg-primary">{{ primaryRoleLabel() }}</span>
            }
          </button>
          <ul class="dropdown-menu dropdown-menu-end">
            <li>
              <a class="dropdown-item" routerLink="/perfil">
                <span class="me-2">&#128100;</span>Mi perfil
              </a>
            </li>
            <li>
              <a class="dropdown-item" routerLink="/memberships">
                <span class="me-2">&#128179;</span>Mis suscripciones
              </a>
            </li>
            <li>
              <hr class="dropdown-divider" />
            </li>
            <li>
              <button type="button" class="dropdown-item text-danger" (click)="logout()">
                <span class="me-2">&#9166;</span>Cerrar sesión
              </button>
            </li>
          </ul>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- ─── Header superior compacto (solo móvil < lg) ──────────────────── -->
<header class="mobile-topbar d-flex d-lg-none align-items-center justify-content-between"
  aria-label="Cabecera móvil">
  <a class="mobile-topbar-brand" routerLink="/feed">Stride365</a>

  <div class="d-flex align-items-center gap-2">
    <!-- Toggle tema (móvil) -->
    <button
      type="button"
      class="mobile-topbar-action"
      (click)="theme.toggle()"
      [attr.aria-label]="theme.isDark() ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro'"
    >
      @if (theme.isDark()) {
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor"
        stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="4.5"/>
        <line x1="12" y1="2" x2="12" y2="4.5"/>
        <line x1="12" y1="19.5" x2="12" y2="22"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="2" y1="12" x2="4.5" y2="12"/>
        <line x1="19.5" y1="12" x2="22" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
      } @else {
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor"
        stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
      }
    </button>

    <button type="button" class="mobile-topbar-action" (click)="logout()" aria-label="Cerrar sesión">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8"
        stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
        <polyline points="16 17 21 12 16 7" />
        <line x1="21" y1="12" x2="9" y2="12" />
      </svg>
    </button>
  </div>
</header>

<main id="main-content" class="container-fluid py-4 has-bottom-nav" tabindex="-1">
  <router-outlet />
</main>
